spring.application.name=bazar

# Banco de dados — usa variável de ambiente se disponível, cai para default local
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bazar}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

# Servidor
server.port=${PORT:8081}

# Segurança JWT — OBRIGATÓRIO definir JWT_SECRET em produção
api.security.token.secret=${JWT_SECRET:my-secret-key-change-in-production}
