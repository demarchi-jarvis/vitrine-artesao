spring.application.name=bazar

# Banco de dados
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bazar}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# JPA
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# Servidor
server.port=${PORT:8081}

# Segurança JWT
api.security.token.secret=${JWT_SECRET:my-secret-key-change-in-production-32chars}

# Actuator — health check para AWS (sem autenticação no /health)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator
