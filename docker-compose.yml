services:
  postgres:
    image: postgres:15-alpine
    container_name: vitrine-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bazar
      POSTGRES_USER: ${DB_USERNAME:-bazar_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bazar_user} -d bazar"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vitrine-net

  app:
    build: .
    container_name: vitrine-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/bazar
      DB_USERNAME: ${DB_USERNAME:-bazar_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-}
      PORT: 8081
    ports:
      - "8081:8081"
    networks:
      - vitrine-net

  # Banco de dados isolado para testes de integração (porta 5433)
  # Inicia com: docker compose --profile test up -d test-db
  test-db:
    image: postgres:15-alpine
    container_name: vitrine-test-db
    profiles: ["test"]
    environment:
      POSTGRES_DB: bazar_test
      POSTGRES_USER: bazar_test
      POSTGRES_PASSWORD: bazar_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bazar_test -d bazar_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - vitrine-net

  # Futuro: adicionar react/angular aqui como serviço "frontend"
  # frontend:
  #   build: ../frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - REACT_APP_API_URL=http://localhost:8081
  #   networks:
  #     - vitrine-net

volumes:
  postgres_data:

networks:
  vitrine-net:
    driver: bridge
